# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
# MySQL Connection Settings
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/mindcare?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8&connectTimeout=60000&socketTimeout=60000
db.username=root
db.password=
db.connection.pool.size=10
db.connection.timeout=60000
db.connection.idle.timeout=600000

# MySQL Connection Pool (HikariCP) - Optional but recommended
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.connectionTimeout=60000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000

# ============================================================================
# TWILIO SMS CONFIGURATION
