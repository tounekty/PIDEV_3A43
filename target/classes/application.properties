# ============================================================================
# APPLICATION CONFIGURATION
# ============================================================================
# App Name and Version
app.name=MindCare Events Management System
app.version=1.0.0
app.description=Student Event Management Platform with AI-Powered Recommendations

# JavaFX UI Settings
javafx.theme=light
javafx.css.path=/styles.css
javafx.window.width=1200
javafx.window.height=800
javafx.window.resizable=true

# ============================================================================
# API CONFIGURATION
# ============================================================================
api.server.host=localhost
api.server.port=8080
api.enable.cors=true
api.cors.allowed.origins=http://localhost:3000,http://localhost:8080
api.request.timeout=30000

# ============================================================================
# EVENT CONFIGURATION
# ============================================================================
# Default event settings
event.default.duration.minutes=60
event.default.overbooking.percent=10
event.max.capacity=5000
event.image.max.size=10485760
event.image.upload.path=./uploads/events/
event.categories=Conference,Workshop,Networking,Social,Sports,Cultural,Academic

# ============================================================================
# RESERVATION CONFIGURATION
# ============================================================================
# Reservation settings
reservation.auto.confirmation=true
reservation.waitlist.enabled=true
reservation.cancellation.deadline.hours=24
reservation.allow.multiple.per.user=false

# ============================================================================
# REMINDER CONFIGURATION
# ============================================================================
# Email reminder settings
reminder.before.event.hours=24,1
reminder.enabled=true
reminder.timezone=UTC
reminder.batch.size=50

# ============================================================================
# AI / RECOMMENDATION CONFIGURATION
# ============================================================================
# Recommendation and prediction settings
recommendation.enabled=true
recommendation.min.engagement.threshold=0.5
prediction.enabled=true
prediction.update.frequency.hours=24
scheduling.optimization.enabled=true

# ============================================================================
# SECURITY CONFIGURATION
# ============================================================================
# Password hashing
security.password.algorithm=BCRYPT
security.password.strength=12
security.jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
security.jwt.expiration.hours=24

# Login settings
security.login.max.attempts=5
security.login.lockout.duration.minutes=15
security.session.timeout.minutes=30

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
# Logging levels and settings
logging.level=INFO
logging.level.org.example=DEBUG
logging.level.com.mysql.cj=WARNING
logging.file.path=./logs/
logging.file.max.size=10MB
logging.file.max.backups=10
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================================
# MONITORING CONFIGURATION
# ============================================================================
# Metrics and monitoring
monitoring.enabled=true
monitoring.metrics.endpoint=http://localhost:8080/metrics
monitoring.health.endpoint=http://localhost:8080/health
monitoring.log.database.queries=true
monitoring.log.api.requests=true

# ============================================================================
# CACHE CONFIGURATION (Optional - if using caching)
# ============================================================================
cache.enabled=false
cache.type=caffeine
cache.default.ttl.minutes=30
cache.max.size=1000

# ============================================================================
# FILE UPLOAD CONFIGURATION
# ============================================================================
upload.directory=./uploads/
upload.temp.directory=./temp/
upload.allowed.extensions=jpg,jpeg,png,gif,pdf,doc,docx
upload.max.file.size=10485760

# ============================================================================
# ENVIRONMENT VARIABLES (Loaded from System)
# ============================================================================
# These can be overridden via system environment variables
# Example: set MAIL_USERNAME=your-email@gmail.com
# Or: export MAIL_USERNAME=your-email@gmail.com (Linux/Mac)
